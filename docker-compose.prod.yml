version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: algoforge-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-algoforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algoforge_prod}
      POSTGRES_DB: ${POSTGRES_DB:-algoforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-algoforge}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: algoforge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js App ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algoforge-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-algoforge}:${POSTGRES_PASSWORD:-algoforge_prod}@postgres:5432/${POSTGRES_DB:-algoforge}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Background Worker ───────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: algoforge-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-algoforge}:${POSTGRES_PASSWORD:-algoforge_prod}@postgres:5432/${POSTGRES_DB:-algoforge}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
